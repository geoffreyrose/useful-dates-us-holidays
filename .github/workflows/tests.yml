name: Tests
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php-version: '8.4'
            coverage: 'true'
            phpunit-version: '13'
          - php-version: '8.5'
            coverage: 'false'
            phpunit-version: '13'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Tests
        run: ./vendor/bin/pest --ci

      - name: Codecov
        if: ${{ matrix.coverage == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./clover.xml
